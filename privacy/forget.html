<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Rioce Computer</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="../image/Rioce-image.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../image/Rioce-image.png">
    <link rel="shortcut icon" href="favicon.ico">
    <script src="../script/forget.js" defer></script>
    <link rel="stylesheet" href="../style/csslogin.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Rioce Computer | Forgot Password</h1>
        </div>
        <div id="forgetBox">
            <div class="form-row required-field">
                <label>Username</label>
                <input type="text" id="fusername" placeholder="Enter username">
            </div>
            <div class="form-row required-field">
                <label>Email</label>
                <input type="email" id="femail" placeholder="Enter email">
            </div>
            <button onclick="sendPassword()">Send Password</button>
        </div>
        <div id="otpBox" style="display:none;">
            <div class="form-row required-field">
                <label>Enter OTP</label>
                <input type="text" id="otp" placeholder="Enter OTP">
            </div>
            <div class="form-row required-field">
                <label>New Password</label>
                <input type="password" id="newpassword" placeholder="New password">
            </div>

            <div class="form-row required-field">
                <label>Repeat Password</label>
                <input type="password" id="repeatnewpassword" placeholder="Repeat password">
            </div>

            <button>Reset Password</button>
        </div>
        <div class="loader" id="loader" style="display:none;">
            <span></span>
        </div>
        <div class="msg" id="msg"></div>
    </div>
</body>
</html>
